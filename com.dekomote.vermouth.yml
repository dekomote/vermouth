app-id: com.dekomote.vermouth
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: vermouth

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --device=input
  - --socket=pulseaudio

modules:
  - name: SDL2
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DSDL_STATIC=OFF
      - -DSDL_TEST=OFF
      - -DSDL_AUDIO=OFF
      - -DSDL_VIDEO=OFF
      - -DSDL_RENDER=OFF
    sources:
      - type: git
        url: https://github.com/libsdl-org/SDL
        tag: release-2.30.9

  - name: vermouth
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: .
