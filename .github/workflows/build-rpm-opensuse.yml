name: Build OpenSUSE RPM

on:
  push:
    tags:
      - 'v*'

jobs:
  build-opensuse-rpm:
    runs-on: ubuntu-latest
    container: opensuse/tumbleweed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          zypper --non-interactive refresh
          zypper --non-interactive install -y \
            cmake gcc-c++ extra-cmake-modules \
            qt6-base-devel qt6-declarative-devel \
            kf6-kirigami-devel kf6-kcoreaddons-devel kf6-ki18n-devel \
            kf6-qqc2-desktop-style-devel icoutils \
            rpm-build

      - name: Build and package
        run: |
          cmake -S . -B build -DCPACK_PACKAGE_VERSION=${{ github.ref_name }} -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build
          cpack --config build/CPackConfig.cmake -G RPM

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opensuse-rpm-package
          path: "*.rpm"
